name: End-to-End Tests

on:
  pull_request:
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          -
            repo: spaze/michalspacek.cz
            php-version: "8.5"
            run: make --directory=app phpstan
            composer-params: --working-dir=app/vendor-dev
          -
            repo: spaze/security-txt
            php-version: "8.5"
            run: composer phpstan

    env:
      HEAD_REF: ${{ github.head_ref || github.ref_name }}

    steps:
    - name: Validate ref type
      if: github.event_name == 'workflow_dispatch' && github.ref_type != 'branch'
      run: |
        echo "::error::workflow_dispatch must be triggered from a branch, not a tag or other ref. Current ref: ${{ github.ref_name }} (type: ${{ github.ref_type }})"
        exit 1

    - name: Checkout ${{ matrix.repo }}
      uses: actions/checkout@v6
      with:
          repository: '${{ matrix.repo }}'

    - name: OS info
      run: cat /etc/os-release

    - name: Install PHP
      uses: shivammathur/setup-php@v2
      with:
        coverage: "none"
        php-version: "${{ matrix.php-version }}"

    - name: PHP info
      run: |
        php -v
        php -m

    - name: Get the latest extension version
      id: latest
      run: echo "version=$(gh release list --repo spaze/phpstan-disallowed-calls --exclude-drafts --exclude-pre-releases --limit 1 --json tagName --jq ".[0].tagName")" >> $GITHUB_OUTPUT
      env:
        GH_TOKEN: ${{ github.token }}

    - name: Update the extension to "dev-${{ env.HEAD_REF }} as ${{ steps.latest.outputs.version }}"
      env:
        LATEST_VERSION: ${{ steps.latest.outputs.version }}
      run: composer require ${{ matrix.composer-params }} --dev "spaze/phpstan-disallowed-calls:dev-${HEAD_REF} as ${LATEST_VERSION}" --with-all-dependencies

    - name: Run tests
      run: ${{ matrix.run }}
